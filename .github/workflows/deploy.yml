name: Build and Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: docflow-deploy
  cancel-in-progress: false

env:
  # REGISTRY is the Docker Hub namespace, not the login host.
  REGISTRY: ${{ vars.REGISTRY || 'oneprocloud' }}
  SSH_HOST: ${{ vars.DOCFLOW_SSH_HOST || '111.91.22.103' }}
  SSH_USER: ${{ vars.DOCFLOW_SSH_USER || 'root' }}
  SSH_PORT: ${{ vars.DOCFLOW_SSH_PORT || '22' }}
  DEPLOY_PATH: ${{ vars.DOCFLOW_DEPLOY_PATH || '/opt/docflow' }}

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && -n "${GITHUB_REF_NAME}" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi

          if [[ ! "${VERSION}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image version: ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

  build-images:
    runs-on: ubuntu-latest
    needs: prepare-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: docflow-api
            context: ./backend
            file: ./backend/Dockerfile
            target: api
            build_args: |
              PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/
              PIP_TRUSTED_HOST=mirrors.aliyun.com
          - image_name: docflow-worker
            context: ./backend
            file: ./backend/Dockerfile
            target: worker
            build_args: |
              PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/
              PIP_TRUSTED_HOST=mirrors.aliyun.com
          - image_name: docflow-web
            context: ./web
            file: ./web/Dockerfile
            target: ""
            # The browser uses the Web container as a same-origin API proxy.
            build_args: |
              VITE_API_URL=/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ needs.prepare-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ matrix.image_name }}:latest
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists: fail

      - name: Copy Compose files to server
        shell: bash
        run: |
          set -euo pipefail
          REMOTE="${SSH_USER}@${SSH_HOST}"
          ssh -p "${SSH_PORT}" "${REMOTE}" "mkdir -p -- '${DEPLOY_PATH}'"
          scp -P "${SSH_PORT}" docker-compose.yml docker-compose.deploy.yml \
            "${REMOTE}:${DEPLOY_PATH}/"

      - name: Deploy to server
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          REMOTE="${SSH_USER}@${SSH_HOST}"

          ssh -p "${SSH_PORT}" "${REMOTE}" bash -s -- \
            "${DEPLOY_PATH}" "${APP_VERSION}" "${REGISTRY}" <<'REMOTE_SCRIPT'
          set -euo pipefail

          DEPLOY_PATH="$1"
          APP_VERSION="$2"
          REGISTRY="$3"
          export APP_VERSION REGISTRY

          cd "${DEPLOY_PATH}"
          exec 9>/tmp/docflow-deploy.lock
          if ! flock -w 300 9; then
            echo "Timed out waiting for another DocFlow deployment" >&2
            exit 1
          fi

          if [[ ! -s .env ]]; then
            echo "${DEPLOY_PATH}/.env is missing or empty" >&2
            exit 1
          fi

          docker network inspect npm_proxy >/dev/null 2>&1 || docker network create npm_proxy >/dev/null
          mkdir -p storage-data

          COMPOSE=(docker compose -p docflow -f docker-compose.yml -f docker-compose.deploy.yml)
          "${COMPOSE[@]}" config --quiet

          echo "Deploying DocFlow ${APP_VERSION}..."
          "${COMPOSE[@]}" pull api worker web
          "${COMPOSE[@]}" up -d --remove-orphans

          healthy=false
          for attempt in $(seq 1 60); do
            running=$("${COMPOSE[@]}" ps --services --filter status=running)
            if grep -qx api <<<"${running}" \
              && grep -qx worker <<<"${running}" \
              && grep -qx web <<<"${running}" \
              && "${COMPOSE[@]}" exec -T api python -c \
                "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)" \
              && "${COMPOSE[@]}" exec -T web wget -qO- http://127.0.0.1/ >/dev/null; then
              healthy=true
              break
            fi
            echo "Waiting for DocFlow services... (${attempt}/60)"
            sleep 5
          done

          if [[ "${healthy}" != true ]]; then
            "${COMPOSE[@]}" ps
            "${COMPOSE[@]}" logs --tail=200 api worker web
            exit 1
          fi

          "${COMPOSE[@]}" ps
          echo "DocFlow ${APP_VERSION} deployed successfully"
          REMOTE_SCRIPT
