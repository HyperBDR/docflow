<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="popup.css"></head><body>
  <main><header><span class="logo"><img src="icons/icon48.png" alt=""></span><div><h1>DocFlow</h1><small>RECORDER</small></div><label class="locale"><span data-i18n="language">Language</span><select id="locale"><option value="zh-CN">中文</option><option value="en">EN</option></select></label></header><div id="message"></div>
    <section id="connect"><label><span data-i18n="apiAddress">DocFlow API 地址</span><input id="api" value="http://localhost:8001"></label><label><span data-i18n="pairingCode">六位配对码</span><input id="code" maxlength="6" inputmode="numeric" placeholder="000000"></label><button id="pair" data-i18n="connect">连接账号</button></section>
    <section id="recorder" hidden>
      <div id="setup"><label><span data-i18n="chooseSpace">选择保存空间</span><select id="space"></select></label><label><span data-i18n="chooseDemo">选择演示</span><select id="demo"></select></label>
        <div class="setup-note"><span class="setup-icon">✦</span><p data-i18n="setupHint">录制模式、AI 和快速教学将在当前页面中打开。</p></div>
        <button id="start"><span>↗</span><b data-i18n="openRecorder">开始录制当前标签页</b></button>
      </div>
      <div id="active-recording" hidden>
        <div class="recording-summary"><span class="record-dot"></span><div><strong id="record-status">Recording</strong><small id="record-mode"></small></div><b id="step-count">0 Steps</b></div>
        <div class="active-actions"><button id="pause" class="secondary">Pause</button><button id="stop" class="danger" data-i18n="stop">Stop Recording</button></div>
      </div>
      <button id="disconnect" class="link" data-i18n="disconnect">断开账号</button>
    </section>
  </main><script src="popup.js"></script>
</body></html>
